<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Fox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container main-container" id="gamecontent">
        <div><canvas id="canvas1"></canvas></div>
        <div id="fullScreenContainer"><button id="fullScreenButton"
                class="btn btn-outline-primary btn-sm">Fullscreen</button></div>
        <div id="volumeControl">
            <img src="assets/bgmicon.png" width="20" height="20" />
            <input type="range" class="form-range" min="0" max="100" id="bgmVolume">
            <img src="assets/soundicon.png" width="20" height="20" />
            <input type="range" class="form-range" min="0" max="100" id="soundVolume">
        </div>
    </div>

    <img id="player" src="assets/player.png" />
    <img id="layer1" src="assets/layer-1_a.png" />
    <img id="layer2" src="assets/layer-2_a-Sheet.png" />
    <img id="layer3" src="assets/layer-3_a.png" />
    <img id="layer4" src="assets/layer-4_a-Sheet.png" />
    <img id="layer5" src="assets/layer-5_a.png" />
    <img id="enemy_fly" src="assets/enemy_flyTest.png" />
    <img id="enemy_plant" src="assets/enemy_plant1Test.png" />
    <img id="enemy_spider_big" src="assets/enemy_spider_bigTest.png" />
    <img id="enemy_zombie" src="assets/enemy_zombie1Test.png" />
    <img id="enemy_zombie2" src="assets/enemy_zombieTest.png" />
    <img id="enemy_bat" src="assets/enemy_batTest.png" />
    <img id="enemy_hand" src="assets/enemy_handTest.png" />
    <img id="enemy_ghost" src="assets/enemy_ghostTest.png" />
    <img id="fire" src="assets/fire.png" />
    <img id="fire2" src="assets/fire2.png" />
    <img id="collisionAnimation" src="assets/boom.png" />
    <img id="lives" src="assets/lives2.png" />
    <img id="energy" src="assets/energy.png" />
    <img id="speed" src="assets/speed.png" />
    <img id="livesUI" src="assets/livesUI.png" />
    <img id="shadow1" src="assets/shadow1.png" />
    <img id="bg2layer1" src="assets/GraveyardLayer1.png" />
    <img id="bg2layer2" src="assets/GraveyardLayer2-Sheet.png" />
    <img id="bg2layer3" src="assets/GraveyardLayer3.png" />
    <img id="bg2layer4" src="assets/GraveyardLayer4-Sheet.png" />
    <img id="bg2layer5" src="assets/GraveyardLayer5.png" />
    <img id="bg3layer1" src="assets/CowLayer1.png" />
    <img id="bg3layer2" src="assets/CowLayer2-Sheet.png" />
    <img id="bg3layer3" src="assets/CowLayer3-Sheet.png" />
    <img id="bg3layer4" src="assets/CowLayer4-Sheet.png" />
    <img id="bg3layer5" src="assets/CowLayer5.png" />
    <img id="rollButton" src="assets/RollButton.png" />
    <img id="buttonUp" src="assets/buttonUp.png" />
    <img id="buttonDown" src="assets/buttonDown.png" />
    <img id="buttonLeft" src="assets/buttonLeft.png" />
    <img id="buttonRight" src="assets/buttonRight.png" />
    <img id="cave1" src="assets/CaveLayer1-Sheet.png" />
    <img id="cave2" src="assets/CaveLayer2.png" />
    <img id="cave3" src="assets/CaveLayer3-Sheet.png" />
    <img id="cave4" src="assets/CaveLayer4.png" />
    <img id="cave5" src="assets/CaveLayer5.png" />
    <img id="enemy_skeleton" src="assets/enemy_skeleton.png" />

    <script type="module" src="scripts/main.js"></script>
</body>

</html>
